<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabla del 3 - Programación</title>
    <link rel="stylesheet" href="multiplicar.css">
    <script src="multiplicar.js"></script>
</head>
<body>

    <header class="header">
        <div class="header-content">
            <button class="btn-probar" onclick="generarTablas()">PROBAR</button>
            
            <div class="input-group">
                <input type="text" id="inputDato" placeholder="Ingrese un comando..." autocomplete="off">
                <span class="cursor-input"></span>
            </div>
        </div>
    </header>

    <main class="container">
        <h1>Tablas</h1>
        
        <div class="tabla-container" id="contenedorTabla">
            <div class="fila"><span>3 x 1</span> <span>=</span> <span>3</span></div>
            <div class="fila"><span>3 x 2</span> <span>=</span> <span>6</span></div>
            <div class="fila"><span>3 x 3</span> <span>=</span> <span>9</span></div>
            <div class="fila"><span>3 x 4</span> <span>=</span> <span>12</span></div>
            <div class="fila"><span>3 x 5</span> <span>=</span> <span>15</span></div>
            <div class="fila"><span>3 x 6</span> <span>=</span> <span>18</span></div>
            <div class="fila"><span>3 x 7</span> <span>=</span> <span>21</span></div>
            <div class="fila"><span>3 x 8</span> <span>=</span> <span>24</span></div>
            <div class="fila"><span>3 x 9</span> <span>=</span> <span>27</span></div>
            <div class="fila"><span>3 x 10</span> <span>=</span> <span>30</span></div>
        </div>

        <footer class="footer">
            <p>Creado por: <span class="nickname">Cristhian Fortis</span></p>
        </footer>
    </main>

</body>
</html>
